# =============================================================================
# Sentinel Core — Deploy Staging
# =============================================================================
# Builds backend (api) + frontend (web), pushes to GHCR, then deploys via SSH.
# Project structure: api/ (Go), web/ (Nuxt 3). No model service.
# =============================================================================

name: Deploy Staging

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  # Opt into Node.js 24 for JS actions (checkout, docker/*); avoids Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            context: ./api
            dockerfile: ./api/docker/Dockerfile.staging
            image_tag: sentinel-backend
            build_args: "VERSION=${{ github.sha }}"

          - service: frontend
            context: ./web
            dockerfile: ./web/docker/Dockerfile.staging
            image_tag: sentinel-frontend
            # Optional: add build-args if Nuxt needs env at build time (e.g. NUXT_PUBLIC_*)
            # build_args: NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}
            build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_tag }}:staging
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy deploy folder to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "deploy/*"
          target: "~/kg"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/kg

            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d
            docker image prune -f
