services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-komgrip}_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-komgrip_secret}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - komgrip_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-komgrip} -d ${POSTGRES_DB:-komgrip_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-komgrip}_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-komgrip_secret}
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-komgrip_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - komgrip_network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile.dev
    container_name: ${PROJECT_NAME:-komgrip}_api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${API_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-komgrip_secret}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-komgrip_secret}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      CHROME_PATH: /usr/bin/chromium
      TIMELINE_PDF_PATH: /app/storages/timeline_pdf/
      STORAGE_URL: ${STORAGE_URL:-http://localhost:8080}
      CANVA_ACCESS_TOKEN: ${CANVA_ACCESS_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_BASE_URL: ${GLM_BASE_URL:-https://api.apiyi.com/v1}
      GLM_MODEL: ${GLM_MODEL:-glm-4.7-flash}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./api:/app
      - api_cache:/go/pkg/mod
      - ./api/storages:/app/storages
    networks:
      - komgrip_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: docker/Dockerfile.dev
    container_name: ${PROJECT_NAME:-komgrip}_web
    environment:
      # Browser (client) calls API on host port 8080
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
      # SSR (server) must use Docker service name so the web container can reach the API
      NUXT_PUBLIC_API_BASE_SERVER: ${NUXT_PUBLIC_API_BASE_SERVER:-http://api:8080/api/v1}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_nuxt:/app/.nuxt
    networks:
      - komgrip_network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_cache:
    driver: local
  web_node_modules:
    driver: local
  web_nuxt:
    driver: local

networks:
  komgrip_network:
    driver: bridge
