# =============================================================================
# Sentinel Core — Staging Deploy (CI/CD)
# =============================================================================
# รันจากโฟลเดอร์ deploy: docker compose up -d
# Images มาจาก GitHub Actions (push to staging) → ghcr.io/OWNER/sentinel-*:staging
# ใส่ .env ในโฟลเดอร์ deploy (หรือใช้ env_file ด้านล่าง)
# =============================================================================

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-komgrip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_net
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    container_name: sentinel_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-komgrip_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CHANGE_THIS_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-komgrip_logs}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sentinel_net
    restart: unless-stopped

  backend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/portnd}/sentinel-backend:staging
    container_name: sentinel_backend
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-staging}
      APP_PORT: 8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-komgrip_admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-CHANGE_THIS_PASSWORD}
      MONGO_DB: ${MONGO_DB:-komgrip_logs}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sentinel_net
    restart: unless-stopped

  frontend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/portnd}/sentinel-frontend:staging
    container_name: sentinel_frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      # Browser: public API URL (ถ้ามี reverse proxy ใช้ https://your-domain.com/api/v1)
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://kg.how.co.th/api/}
      # SSR: web container เรียก backend โดยตรง
      NUXT_PUBLIC_API_BASE_SERVER: http://backend:8080/api/
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sentinel_net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  sentinel_net:
    driver: bridge
