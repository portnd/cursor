# =============================================================================
# Sentinel Core — Staging (kg.how.co.th)
# =============================================================================
# รันบน server: cd ~/kg && docker compose pull && docker compose up -d
# =============================================================================

name: sentinel-staging

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    image: postgres:15-alpine
    container_name: sentinel_migrate
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    command:
      - sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS schema_migrations (id SERIAL PRIMARY KEY, version VARCHAR(255) NOT NULL UNIQUE, applied_at TIMESTAMPTZ DEFAULT NOW());"
        for f in /migrations/*.up.sql; do
          [ -f "$$f" ] || continue
          v="$$(basename "$$f" .up.sql)"
          if psql -tAc "SELECT 1 FROM schema_migrations WHERE version = '$$v' LIMIT 1" | grep -q 1; then
            echo "Skipping $$v (already applied)"
            continue
          fi
          echo "Applying $$v"
          psql -v ON_ERROR_STOP=1 -f "$$f"
          psql -v ON_ERROR_STOP=1 -c "INSERT INTO schema_migrations (version) VALUES ('$$v')"
        done
    volumes:
      - ./databases/migrations:/migrations:ro
    networks:
      - sentinel_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: ${GHCR_IMAGE_PREFIX}/sentinel-backend:staging
    container_name: sentinel_backend
    env_file:
      - .env
    environment:
      APP_ENV: staging
      APP_PORT: 8080
      CHROME_PATH: /usr/bin/chromium
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_URL: ${STORAGE_URL}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_BASE_URL: ${GLM_BASE_URL:-}
      GLM_MODEL: ${GLM_MODEL:-glm-4.7-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      USE_NOOP_AI: ${USE_NOOP_AI:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - sentinel_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ${GHCR_IMAGE_PREFIX}/sentinel-frontend:staging
    container_name: sentinel_frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_API_BASE_SERVER: http://backend:8080/api/v1
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - sentinel_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: sentinel_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - sentinel_net
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:

networks:
  sentinel_net:
    driver: bridge