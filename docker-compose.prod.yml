# =============================================================================
# KOMGRIP - PRODUCTION DOCKER COMPOSE
# =============================================================================
# This configuration is optimized for production deployment
# 
# IMPORTANT SECURITY NOTES:
# - Change all default passwords before deploying
# - Use Docker secrets or external secret management in production
# - Enable TLS/SSL certificates
# - Set resource limits appropriate to your infrastructure
# =============================================================================

version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Primary)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-komgrip}_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-komgrip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - komgrip_network_prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # MongoDB (Secondary - Logs & Audits)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:6-jammy
    container_name: ${PROJECT_NAME:-komgrip}_mongo_prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-komgrip_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CHANGE_THIS_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-komgrip_logs}
    volumes:
      - mongo_data_prod:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - komgrip_network_prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-komgrip}_redis_prod
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data_prod:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - komgrip_network_prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Backend API (Go)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile.prod
    image: komgrip-api:${VERSION:-latest}
    container_name: ${PROJECT_NAME:-komgrip}_api_prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_PORT: ${API_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-komgrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-komgrip_db}
      MONGO_URI: mongodb://${MONGO_USER:-komgrip_admin}:${MONGO_PASSWORD:-CHANGE_THIS_PASSWORD}@mongo:27017
      MONGO_DB: ${MONGO_DB:-komgrip_logs}
      REDIS_ADDR: redis:6379
      REDIS_PASS: ${REDIS_PASSWORD:-CHANGE_THIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - komgrip_network_prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ---------------------------------------------------------------------------
  # Frontend Web (Nuxt 3)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: docker/Dockerfile.prod
    image: komgrip-web:${VERSION:-latest}
    container_name: ${PROJECT_NAME:-komgrip}_web_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://api:8080}
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - komgrip_network_prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  komgrip_network_prod:
    driver: bridge
    name: komgrip_prod_network

# =============================================================================
# VOLUMES (Persistent Data)
# =============================================================================
volumes:
  postgres_data_prod:
    driver: local
    name: komgrip_postgres_prod
  mongo_data_prod:
    driver: local
    name: komgrip_mongo_prod
  redis_data_prod:
    driver: local
    name: komgrip_redis_prod

# =============================================================================
# DEPLOYMENT INSTRUCTIONS:
# 
# 1. Create production .env file:
#    cp .env.example .env.prod
#    # Edit .env.prod with production values
# 
# 2. Build images:
#    docker-compose -f docker-compose.prod.yml build
# 
# 3. Start services:
#    docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
# 
# 4. Check status:
#    docker-compose -f docker-compose.prod.yml ps
# 
# 5. View logs:
#    docker-compose -f docker-compose.prod.yml logs -f
# 
# 6. Stop services:
#    docker-compose -f docker-compose.prod.yml down
# 
# IMPORTANT PRODUCTION CHECKLIST:
# ✅ Change all default passwords
# ✅ Generate strong JWT secret (32+ characters)
# ✅ Configure CORS_ORIGINS to your domain
# ✅ Set up reverse proxy (Nginx/Caddy) with SSL
# ✅ Configure automatic backups for databases
# ✅ Set up monitoring (Prometheus/Grafana)
# ✅ Configure log aggregation
# ✅ Enable firewall rules
# ✅ Set resource limits appropriate to your server
# =============================================================================
